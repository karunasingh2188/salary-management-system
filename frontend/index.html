<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>-
            <h1> Employee Salary Management System</h1>
        </header>

        <!-- Analytics Section (Bonus) -->
        <div class="analytics">
            <div class="stat-card">
                <h3>Total Employees</h3>
                <span id="totalEmployees">0</span>
            </div>
            <div class="stat-card">
                <h3>Avg Salary</h3>
                <span id="avgSalary">$0</span>
            </div>
            <div class="stat-card">
                <h3>Total Salary</h3>
                <span id="totalSalary">$0</span>
            </div>
        </div>

        <!-- Employee Form -->
        <div class="form-section">
            <h2>Add/Edit Employee</h2>
            <form id="employeeForm">
                <input type="hidden" id="employeeId">
                
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="salary">Salary * (USD)</label>
                    <input type="number" id="salary" min="0" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="experience">Experience * (Years)</label>
                    <input type="number" id="experience" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" required>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submitBtn">Add Employee</button>
                    <button type="button" id="clearBtn">Clear Form</button>
                </div>
            </form>
        </div>

        <!-- Employees Table -->
        <div class="table-section">
            <div class="table-header">
                <h2>Employees List</h2>
                <span id="errorMessage" class="error"></span>
            </div>
            <div class="table-container">
                <table id="employeesTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Salary</th>
                            <th>Experience</th>
                            <th>City</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
